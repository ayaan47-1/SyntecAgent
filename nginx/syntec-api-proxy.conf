# Syntec AI Chatbot API - Nginx Reverse Proxy Configuration
#
# Add this configuration to your WordPress site's Nginx server block
# Location: /etc/nginx/sites-available/build.syntecgroup.com
#
# Instructions:
# 1. Open your Nginx config: sudo nano /etc/nginx/sites-available/build.syntecgroup.com
# 2. Add this location block inside the existing server block (after other location blocks)
# 3. Test configuration: sudo nginx -t
# 4. Reload Nginx: sudo systemctl reload nginx

# Syntec AI Chat API Proxy
location /api/ {
    # Proxy to Flask backend running on localhost:5001
    proxy_pass http://localhost:5001/api/;

    # HTTP version (required for keepalive)
    proxy_http_version 1.1;

    # Forward headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support (future enhancement)
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Timeouts for long-running requests (GPT responses can take time)
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Buffer settings
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;

    # Don't pass Authorization header to backend (if you add it later)
    # proxy_set_header Authorization "";
}

