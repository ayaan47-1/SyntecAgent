services:
  redis:
    image: redis:7-alpine
    container_name: syntec-ai-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: syntec-ai-backend
    ports:
      - "5001:5001"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PORT=5001
      - FLASK_ENV=production
      - CORS_ORIGINS=http://localhost,http://localhost:80,https://chat.syntecgroup.com
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./data:/app/data
      - ./classifications.db:/app/classifications.db
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./chatbot-frontend
      dockerfile: Dockerfile
    container_name: syntec-ai-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped


volumes:
  chroma_db:
    driver: local
  redis_data:
    driver: local
